<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satellite Coffee — Community Bulletin Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#241A12;
    --paper-soft:#2E2117;
    --panel:#FBF8F2;
    --line:#3A2C1F;
    --line-soft:#EAE3D4;
    --ink:#241C15;
    --ink-soft:#6B5F4F;
    --cream:#F3EADA;
    --cream-soft:#C9B99E;
    --green:#1F3A2E;
    --green-bright:#4E8770;
    --green-soft:#E7EDE9;
    --orange:#C97A3D;
    --orange-soft:#F5E6D8;
    --teal:#3E7C7A;
    --teal-bright:#6BB3AF;
    --teal-soft:#E3EEED;
    --radius:14px;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .board{
    max-width:1180px;
    margin:0 auto;
    padding:44px 32px 72px;
  }

  .board-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
    margin-bottom:36px;
    padding-bottom:26px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .brand .logo{
    width:46px;
    height:auto;
    flex-shrink:0;
    display:block;
  }

  .brand-text .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--orange);
    margin:0 0 4px;
    font-weight:600;
  }

  .brand-text h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(24px, 3.4vw, 34px);
    font-weight:700;
    margin:0;
    line-height:1.05;
    letter-spacing:-0.01em;
    color:var(--cream);
  }

  .board-header .updated{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--cream-soft);
    text-align:right;
    white-space:nowrap;
  }

  .grid{
    column-width:300px;
    column-gap:20px;
  }

  .card{
    position:relative;
    width:100%;
    margin:0 0 20px;
    break-inside:avoid;
    background:var(--panel);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:22px 22px 20px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .card:hover, .card:focus-visible{
    transform:translateY(-3px);
    box-shadow:0 14px 30px -14px rgba(0,0,0,0.5);
    border-color:var(--ink);
    outline:none;
  }

  .card:focus-visible{
    box-shadow:0 0 0 3px var(--teal-soft), 0 14px 30px -14px rgba(0,0,0,0.5);
  }

  .pin{
    position:absolute;
    top:18px;
    right:18px;
    width:9px;
    height:9px;
    border-radius:50%;
  }

  .tag{
    display:inline-flex;
    align-items:center;
    align-self:flex-start;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:5px 10px;
    border-radius:999px;
  }

  .card h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:19px;
    font-weight:600;
    line-height:1.25;
    margin:0;
    padding-right:16px;
    color:var(--ink);
  }

  .card p.desc{
    font-size:14px;
    line-height:1.5;
    color:var(--ink-soft);
    margin:0;
    flex-grow:1;
  }

  .card .thumb{
    width:100%;
    aspect-ratio:16/10;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:2px;
  }

  .card-footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top:10px;
    border-top:1px solid var(--line-soft);
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:var(--ink-soft);
  }

  .card-footer .read-more{
    color:var(--green);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }

  /* Category color coding */
  .cat-event{ background:var(--teal-soft); color:var(--teal); }
  .cat-menu{ background:var(--orange-soft); color:var(--orange); }
  .cat-job{ background:var(--green-soft); color:var(--green); }
  .cat-announcement{ background:#EFEAF7; color:#6B4FA0; }
  .cat-community{ background:#F5E6D8; color:#A0562E; }
  .cat-pet{ background:#FCE9EE; color:#B23A63; }
  .cat-seasonal{ background:#F4EDD1; color:#8A6D1F; }
  .cat-bakery{ background:#FBE3D6; color:#B0552C; }

  .pin.cat-event{ background:var(--teal); }
  .pin.cat-menu{ background:var(--orange); }
  .pin.cat-job{ background:var(--green); }
  .pin.cat-announcement{ background:#6B4FA0; }
  .pin.cat-community{ background:#A0562E; }
  .pin.cat-pet{ background:#B23A63; }
  .pin.cat-seasonal{ background:#8A6D1F; }
  .pin.cat-bakery{ background:#B0552C; }

  .card.featured .thumb{
    aspect-ratio:auto;
    height:auto;
    object-fit:contain;
  }

  /* Modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(20,14,9,0.65);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
    z-index:50;
  }
  .modal-overlay.open{
    opacity:1;
    pointer-events:auto;
  }

  .modal{
    background:var(--panel);
    border-radius:18px;
    max-width:560px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:32px;
    position:relative;
    transform:translateY(12px) scale(.98);
    transition:transform .18s ease;
  }
  .modal-overlay.open .modal{
    transform:translateY(0) scale(1);
  }

  .modal img{
    width:100%;
    border-radius:10px;
    margin-bottom:18px;
    object-fit:cover;
    max-height:280px;
  }

  .modal .tag{ margin-bottom:14px; }

  .modal h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:24px;
    font-weight:700;
    margin:0 0 14px;
    line-height:1.2;
    color:var(--ink);
  }

  .modal .body{
    font-size:15px;
    line-height:1.65;
    color:var(--ink-soft);
    margin:0 0 20px;
    white-space:pre-line;
  }

  .modal .meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    border-top:1px solid var(--line-soft);
    padding-top:16px;
  }

  .modal .meta a{
    color:var(--green);
    font-weight:600;
    text-decoration:none;
  }
  .modal .meta a:hover{ text-decoration:underline; }

  .modal-close{
    position:absolute;
    top:18px;
    right:18px;
    width:32px;
    height:32px;
    border-radius:50%;
    border:1px solid var(--line-soft);
    background:var(--paper-soft);
    font-size:16px;
    line-height:1;
    cursor:pointer;
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .modal-close:hover{ background:var(--ink); }

  footer.board-footer{
    margin-top:44px;
    padding-top:20px;
    border-top:1px solid var(--line);
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:var(--cream-soft);
    text-align:center;
  }
</style>
</head>

function formatDate(iso){
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

const grid = document.getElementById('grid');

posts.forEach((post, i) => {
  const cls = catClass[post.category] || "cat-announcement";
  const card = document.createElement('div');
  const isFeatured = post.image && !post.vertical;
  card.className = "card" + (isFeatured ? " featured" : "");
  card.tabIndex = 0;
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', "Open post: " + post.title);

  card.innerHTML = `
    <span class="pin ${cls}"></span>
    ${post.image ? `<img class="thumb" src="${post.image}" alt="${post.title}">` : ""}
    <span class="tag ${cls}">${post.category}</span>
    <h2>${post.title}</h2>
    <p class="desc">${post.description}</p>
    <div class="card-footer">
      <span>${formatDate(post.date)}</span>
      <span class="read-more">Read more →</span>
    </div>
  `;

  card.addEventListener('click', () => openModal(post));
  card.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      openModal(post);
    }
  });

  grid.appendChild(card);
});

const overlay = document.getElementById('modalOverlay');
const modalTag = document.getElementById('modalTag');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
const modalDate = document.getElementById('modalDate');
const modalLink = document.getElementById('modalLink');
const modalImageWrap = document.getElementById('modalImageWrap');
const modalClose = document.getElementById('modalClose');

function openModal(post){
  const cls = catClass[post.category] || "cat-announcement";
  modalTag.className = "tag " + cls;
  modalTag.textContent = post.category;
  modalTitle.textContent = post.title;
  modalBody.textContent = post.content;
  modalDate.textContent = formatDate(post.date);
  modalImageWrap.innerHTML = post.image ? `<img src="${post.image}" alt="${post.title}">` : "";

  if(post.link){
    modalLink.style.display = "inline";
    modalLink.href = post.link;
  } else {
    modalLink.style.display = "none";
  }

  overlay.classList.add('open');
  modalClose.focus();
}

function closeModal(){
  overlay.classList.remove('open');
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => {
  if(e.target === overlay) closeModal();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeModal();
});
</script>
